<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Getaways</title>

<style>
body {
  margin: 0;
  background: #f3efe8;
  display: flex;
  justify-content: center;
}

/* WRAPPER */
.wrapper {
  position: relative;
  width: 100%;
  max-width: 636px; /* or 1000px if you want bigger */
  margin: auto;
}

/* IMAGE */
.main-img {
  width: 100%;
  display: block;
}

/* CLICK AREAS */
.click {
  position: absolute;
  display: block;
  cursor: pointer;
}

/* TOP BUTTON */
.top-btn {
  bottom: 48%;
  left: 10%;
  width: 80%;
  height: 6%;
}

/* PHONE PREVIEW */
.phone {
  top: 2%;
  left: 55%;
  width: 35%;
  height: 45%;
  border-radius: 30px;
}

/* BOTTOM BUTTON */
.bottom-btn {
  bottom: 5%;
  left: 10%;
  width: 80%;
  height: 7%;
}

/* TEST MODE (shows boxes) */
.show .click {
  background: rgba(255,0,0,0.2);
  outline: 2px solid red;
}

@media (max-width: 768px) {
  body {
    display: block;
  }

  .wrapper {
    max-width: 100%;
  }
}
</style>
</head>

<body>

<div class="wrapper" id="wrap">

  <img src="membership.png" class="main-img">

  <!-- CLICK AREAS -->
  <div class="click top-btn"></div>
  <div class="click phone"></div>
  <div class="click bottom-btn"></div>

</div>

<script>
const STRIPE_LINK = "https://buy.stripe.com/4gM3cubAZ0ySb232J81oI02";

// make all clickable areas go to Stripe
document.querySelectorAll('.click').forEach(el => {
  el.addEventListener('click', () => {
    window.open(STRIPE_LINK, '_blank');
  });
});

// add ?test=1 to URL to see click zones
if (window.location.search.includes("test=1")) {
  document.getElementById("wrap").classList.add("show");
}
</script>

</body>
</html>
